<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JLPT語彙クイズ — Demo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=Courier+Prime:wght@400;700&display=swap');

*{margin:0;padding:0;box-sizing:border-box}

:root {
  --bg: #0e0d0b;
  --surface: #171613;
  --surface2: #1f1d19;
  --border: rgba(255,255,255,0.08);
  --text: #e8e3d8;
  --text-dim: #7a7468;
  --text-hint: #4a4640;
  --red: #e05a3a;
  --red-dim: rgba(224,90,58,0.15);
  --gold: #d4a426;
  --gold-dim: rgba(212,164,38,0.12);
  --green: #4caf78;
  --green-dim: rgba(76,175,120,0.15);
  --blue: #5ba4cf;
  --blue-dim: rgba(91,164,207,0.12);
  --mono: 'Courier Prime', monospace;
  --jp: 'Zen Kaku Gothic New', sans-serif;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--jp);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── HEADER ── */
.header {
  padding: 20px 28px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  background: rgba(14,13,11,0.92);
  backdrop-filter: blur(8px);
  z-index: 10;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-mark {
  font-size: 20px;
  font-weight: 900;
  color: var(--red);
  letter-spacing: -0.03em;
}

.logo-text {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: 0.15em;
  text-transform: uppercase;
}

.header-stats {
  display: flex;
  gap: 20px;
  align-items: center;
}

.hstat {
  text-align: center;
}

.hstat-num {
  font-family: var(--mono);
  font-size: 18px;
  font-weight: 700;
  display: block;
  line-height: 1;
}

.hstat-lbl {
  font-size: 9px;
  color: var(--text-dim);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.hstat.correct .hstat-num { color: var(--green); }
.hstat.wrong .hstat-num { color: var(--red); }
.hstat.score .hstat-num { color: var(--gold); }

/* ── SETUP SCREEN ── */
#setup-screen {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
}

.setup-card {
  width: 100%;
  max-width: 540px;
}

.setup-title {
  font-size: 36px;
  font-weight: 900;
  letter-spacing: -0.02em;
  margin-bottom: 6px;
}

.setup-title span { color: var(--red); }

.setup-sub {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 32px;
}

.form-group {
  margin-bottom: 20px;
}

.form-label {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-bottom: 8px;
  display: block;
}

.option-grid {
  display: grid;
  gap: 8px;
}

.option-grid.cols-5 { grid-template-columns: repeat(5, 1fr); }
.option-grid.cols-2 { grid-template-columns: repeat(2, 1fr); }
.option-grid.cols-3 { grid-template-columns: repeat(3, 1fr); }

.opt-btn {
  padding: 10px 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text-dim);
  font-family: var(--jp);
  font-size: 12px;
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
  line-height: 1.3;
}

.opt-btn:hover {
  border-color: rgba(255,255,255,0.2);
  color: var(--text);
}

.opt-btn.selected {
  background: var(--red-dim);
  border-color: var(--red);
  color: var(--red);
}

.opt-btn .opt-badge {
  display: block;
  font-weight: 900;
  font-size: 14px;
  margin-bottom: 2px;
}

.opt-btn .opt-sub {
  font-size: 10px;
  opacity: 0.7;
}

.count-row {
  display: flex;
  align-items: center;
  gap: 12px;
}

.count-input {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-family: var(--mono);
  font-size: 16px;
  font-weight: 700;
  padding: 10px 16px;
  width: 80px;
  text-align: center;
}

.count-input:focus { outline: none; border-color: var(--red); }

.start-btn {
  margin-top: 28px;
  width: 100%;
  padding: 16px;
  background: var(--red);
  border: none;
  border-radius: 8px;
  color: white;
  font-family: var(--jp);
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 0.08em;
  cursor: pointer;
  transition: all 0.15s;
}

.start-btn:hover { background: #c94e30; transform: translateY(-1px); }
.start-btn:active { transform: translateY(0); }

/* ── QUIZ SCREEN ── */
#quiz-screen {
  flex: 1;
  display: none;
  flex-direction: column;
  align-items: center;
  padding: 32px 20px;
}

/* Progress bar */
.progress-bar {
  width: 100%;
  max-width: 600px;
  height: 3px;
  background: var(--surface2);
  border-radius: 2px;
  margin-bottom: 28px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: var(--red);
  transition: width 0.4s ease;
  border-radius: 2px;
}

/* Streak badge */
.streak-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 12px;
  background: var(--gold-dim);
  border: 1px solid rgba(212,164,38,0.3);
  border-radius: 20px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--gold);
  margin-bottom: 20px;
  opacity: 0;
  transition: opacity 0.3s;
  letter-spacing: 0.08em;
}

.streak-badge.visible { opacity: 1; }

/* Question card */
.question-card {
  width: 100%;
  max-width: 600px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 40px;
  margin-bottom: 20px;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.question-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--red), var(--gold));
}

.q-meta {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-hint);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-bottom: 20px;
}

.q-prompt {
  font-size: 56px;
  font-weight: 900;
  letter-spacing: -0.02em;
  line-height: 1.1;
  margin-bottom: 8px;
  transition: transform 0.2s;
}

.q-prompt-sub {
  font-family: var(--mono);
  font-size: 16px;
  color: var(--text-dim);
  letter-spacing: 0.08em;
  margin-bottom: 0;
}

/* Choices */
.choices {
  width: 100%;
  max-width: 600px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 20px;
}

.choice-btn {
  padding: 16px 18px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-family: var(--jp);
  font-size: 14px;
  cursor: pointer;
  text-align: left;
  transition: all 0.15s;
  line-height: 1.4;
}

.choice-btn:hover:not(:disabled) {
  border-color: rgba(255,255,255,0.25);
  background: var(--surface2);
}

.choice-btn .choice-text { display: block; font-weight: 500; }
.choice-btn .choice-sub { display: block; font-size: 11px; color: var(--text-dim); margin-top: 2px; }

.choice-btn.correct {
  background: var(--green-dim);
  border-color: var(--green);
  color: var(--green);
}

.choice-btn.correct .choice-sub { color: rgba(76,175,120,0.7); }

.choice-btn.wrong {
  background: var(--red-dim);
  border-color: var(--red);
  color: var(--red);
}

.choice-btn.wrong .choice-sub { color: rgba(224,90,58,0.7); }

.choice-btn:disabled { cursor: default; }

/* Flashcard flip */
.flashcard {
  width: 100%;
  max-width: 600px;
  perspective: 1000px;
  margin-bottom: 20px;
  cursor: pointer;
}

.flashcard-inner {
  position: relative;
  height: 200px;
  transform-style: preserve-3d;
  transition: transform 0.5s cubic-bezier(0.4,0,0.2,1);
}

.flashcard.flipped .flashcard-inner {
  transform: rotateY(180deg);
}

.flashcard-front, .flashcard-back {
  position: absolute;
  inset: 0;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 28px;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
}

.flashcard-front::before, .flashcard-back::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--red), var(--gold));
  border-radius: 16px 16px 0 0;
}

.flashcard-back {
  transform: rotateY(180deg);
  background: var(--surface2);
}

.flip-hint {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-hint);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-bottom: 12px;
}

.fc-prompt {
  font-size: 52px;
  font-weight: 900;
  text-align: center;
}

.fc-kana {
  font-size: 16px;
  color: var(--text-dim);
  font-family: var(--mono);
  margin-top: 6px;
}

.fc-meaning {
  font-size: 24px;
  font-weight: 700;
  text-align: center;
  color: var(--gold);
  margin-bottom: 4px;
}

.fc-meaning-ja {
  font-size: 13px;
  color: var(--text-dim);
}

.fc-buttons {
  width: 100%;
  max-width: 600px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 20px;
}

.fc-btn {
  padding: 14px;
  border: 1px solid var(--border);
  border-radius: 10px;
  font-family: var(--jp);
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
}

.fc-btn.knew {
  background: var(--green-dim);
  border-color: var(--green);
  color: var(--green);
}

.fc-btn.knew:hover { background: rgba(76,175,120,0.25); }

.fc-btn.forgot {
  background: var(--red-dim);
  border-color: var(--red);
  color: var(--red);
}

.fc-btn.forgot:hover { background: rgba(224,90,58,0.25); }

/* Feedback overlay */
.feedback {
  width: 100%;
  max-width: 600px;
  padding: 16px 20px;
  border-radius: 10px;
  margin-bottom: 16px;
  display: none;
  animation: slideIn 0.2s ease;
}

@keyframes slideIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:none} }

.feedback.show { display: block; }
.feedback.correct { background: var(--green-dim); border: 1px solid rgba(76,175,120,0.3); }
.feedback.wrong { background: var(--red-dim); border: 1px solid rgba(224,90,58,0.3); }

.feedback-head {
  font-weight: 700;
  font-size: 14px;
  margin-bottom: 4px;
}

.feedback.correct .feedback-head { color: var(--green); }
.feedback.wrong .feedback-head { color: var(--red); }

.feedback-example {
  font-size: 12px;
  color: var(--text-dim);
  line-height: 1.6;
}

/* NEXT button */
.next-btn {
  width: 100%;
  max-width: 600px;
  padding: 14px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text-dim);
  font-family: var(--jp);
  font-size: 14px;
  cursor: pointer;
  transition: all 0.15s;
  display: none;
  letter-spacing: 0.05em;
}

.next-btn.show { display: block; }
.next-btn:hover { border-color: rgba(255,255,255,0.25); color: var(--text); }

/* ── RESULT SCREEN ── */
#result-screen {
  flex: 1;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
}

.result-card {
  width: 100%;
  max-width: 540px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 40px;
}

.grade-display {
  text-align: center;
  margin-bottom: 32px;
}

.grade-letter {
  font-size: 80px;
  font-weight: 900;
  line-height: 1;
  margin-bottom: 8px;
  display: block;
}

.grade-label {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text-dim);
  letter-spacing: 0.15em;
  text-transform: uppercase;
}

.result-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 28px;
}

.rstat {
  background: var(--surface2);
  border-radius: 10px;
  padding: 14px;
  text-align: center;
}

.rstat-num {
  font-family: var(--mono);
  font-size: 24px;
  font-weight: 700;
  display: block;
  margin-bottom: 4px;
}

.rstat-lbl {
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.rstat.c .rstat-num { color: var(--green); }
.rstat.w .rstat-num { color: var(--red); }
.rstat.s .rstat-num { color: var(--gold); }

.wrong-section {
  margin-top: 20px;
}

.wrong-title {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}

.wrong-word {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}

.wrong-word:last-child { border-bottom: none; }

.ww-kanji { font-weight: 700; font-size: 16px; }
.ww-kana { font-size: 11px; color: var(--text-dim); display: block; }
.ww-meaning { color: var(--text-dim); font-size: 12px; text-align: right; }

.restart-btn {
  margin-top: 28px;
  width: 100%;
  padding: 14px;
  background: var(--red);
  border: none;
  border-radius: 8px;
  color: white;
  font-family: var(--jp);
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.05em;
}

.restart-btn:hover { background: #c94e30; }

/* ── LEVEL PILL ── */
.level-pill {
  display: inline-block;
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 4px;
  letter-spacing: 0.1em;
  margin-left: 8px;
}

.pill-N5 { background: var(--blue-dim); color: var(--blue); border: 1px solid rgba(91,164,207,0.3); }
.pill-N4 { background: var(--green-dim); color: var(--green); border: 1px solid rgba(76,175,120,0.3); }
.pill-N3 { background: var(--gold-dim); color: var(--gold); border: 1px solid rgba(212,164,38,0.3); }
.pill-N2 { background: rgba(224,90,58,0.1); color: #e09060; border: 1px solid rgba(224,90,58,0.3); }
.pill-N1 { background: var(--red-dim); color: var(--red); border: 1px solid rgba(224,90,58,0.4); }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">
    <div class="logo-mark">JLPT</div>
    <div class="logo-text">語彙クイズ</div>
  </div>
  <div class="header-stats">
    <div class="hstat correct">
      <span class="hstat-num" id="h-correct">0</span>
      <span class="hstat-lbl">正解</span>
    </div>
    <div class="hstat wrong">
      <span class="hstat-num" id="h-wrong">0</span>
      <span class="hstat-lbl">不正解</span>
    </div>
    <div class="hstat score">
      <span class="hstat-num" id="h-score">0</span>
      <span class="hstat-lbl">スコア</span>
    </div>
  </div>
</div>

<!-- SETUP SCREEN -->
<div id="setup-screen">
  <div class="setup-card">
    <div class="setup-title">日本語<span>能力</span>試験</div>
    <div class="setup-sub">JLPT Vocabulary Quiz</div>

    <div class="form-group">
      <label class="form-label">レベル選択</label>
      <div class="option-grid cols-5" id="level-opts">
        <button class="opt-btn selected" data-val="N5" onclick="select('level', this)">
          <span class="opt-badge">N5</span>
          <span class="opt-sub">初級</span>
        </button>
        <button class="opt-btn" data-val="N4" onclick="select('level', this)">
          <span class="opt-badge">N4</span>
          <span class="opt-sub">初中級</span>
        </button>
        <button class="opt-btn" data-val="N3" onclick="select('level', this)">
          <span class="opt-badge">N3</span>
          <span class="opt-sub">中級</span>
        </button>
        <button class="opt-btn" data-val="N2" onclick="select('level', this)">
          <span class="opt-badge">N2</span>
          <span class="opt-sub">上級</span>
        </button>
        <button class="opt-btn" data-val="N1" onclick="select('level', this)">
          <span class="opt-badge">N1</span>
          <span class="opt-sub">最上級</span>
        </button>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">モード選択</label>
      <div class="option-grid cols-2" id="mode-opts">
        <button class="opt-btn selected" data-val="kanji_to_meaning" onclick="select('mode', this)">
          <span class="opt-badge" style="font-size:13px">漢字→意味</span>
          <span class="opt-sub">漢字を見て意味を選ぶ</span>
        </button>
        <button class="opt-btn" data-val="meaning_to_kanji" onclick="select('mode', this)">
          <span class="opt-badge" style="font-size:13px">意味→漢字</span>
          <span class="opt-sub">意味から漢字を選ぶ</span>
        </button>
        <button class="opt-btn" data-val="kana_to_kanji" onclick="select('mode', this)">
          <span class="opt-badge" style="font-size:13px">かな→漢字</span>
          <span class="opt-sub">読み方から漢字を選ぶ</span>
        </button>
        <button class="opt-btn" data-val="flashcard" onclick="select('mode', this)">
          <span class="opt-badge" style="font-size:13px">フラッシュカード</span>
          <span class="opt-sub">めくって自己採点</span>
        </button>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">問題数</label>
      <div class="count-row">
        <input type="number" class="count-input" id="count-input" value="10" min="5" max="20">
        <span style="font-size:12px;color:var(--text-dim)">問 (5–20)</span>
      </div>
    </div>

    <button class="start-btn" onclick="startQuiz()">クイズを始める →</button>
  </div>
</div>

<!-- QUIZ SCREEN -->
<div id="quiz-screen">
  <div class="progress-bar" style="width:100%;max-width:600px">
    <div class="progress-fill" id="progress-fill" style="width:0%"></div>
  </div>

  <div class="streak-badge" id="streak-badge">🔥 <span id="streak-num">0</span> 連続正解</div>

  <!-- MC Question -->
  <div id="mc-area" style="width:100%;max-width:600px;display:flex;flex-direction:column;align-items:center">
    <div class="question-card" id="question-card">
      <div class="q-meta" id="q-meta">問題 1 / 10</div>
      <div class="q-prompt" id="q-prompt">—</div>
      <div class="q-prompt-sub" id="q-prompt-sub"></div>
    </div>

    <div class="choices" id="choices"></div>

    <div class="feedback" id="feedback">
      <div class="feedback-head" id="feedback-head"></div>
      <div class="feedback-example" id="feedback-example"></div>
    </div>

    <button class="next-btn" id="next-btn" onclick="nextQuestion()">次の問題へ →</button>
  </div>

  <!-- Flashcard -->
  <div id="fc-area" style="width:100%;max-width:600px;display:none;flex-direction:column;align-items:center">
    <div class="question-card" style="text-align:center;cursor:default">
      <div class="q-meta" id="fc-meta">問題 1 / 10</div>
      <div class="q-prompt" id="fc-prompt">—</div>
      <div class="q-prompt-sub" id="fc-kana"></div>
    </div>

    <div class="flashcard" id="flashcard" onclick="flipCard()">
      <div class="flashcard-inner">
        <div class="flashcard-front">
          <div class="flip-hint">タップして答えを確認</div>
          <div style="font-size:40px;color:var(--text-dim)">？</div>
        </div>
        <div class="flashcard-back" id="fc-back">

// ── Selection helpers
function select(group, btn) {
  const container = btn.closest('.option-grid');
  container.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  cfg[group] = btn.dataset.val;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getPool() {
  return VOCAB.filter(w => w.level === cfg.level);
}

function buildChoices(correct, pool) {
  const choices = [{ word: correct, correct: true }];
  const others = shuffle(pool.filter(w => w.id !== correct.id));
  const used = new Set([correct.meaning]);
  for (const w of others) {
    if (choices.length >= 4) break;
    if (!used.has(w.meaning)) {
      choices.push({ word: w, correct: false });
      used.add(w.meaning);
    }
  }
  while (choices.length < 4) {
    const fallback = VOCAB.find(w => w.id !== correct.id && !used.has(w.meaning));
    if (!fallback) break;
    choices.push({ word: fallback, correct: false });
    used.add(fallback.meaning);
  }
  return shuffle(choices);
}

  const countVal = parseInt(document.getElementById('count-input').value) || 10;
  cfg.count = Math.min(Math.max(countVal, 5), 20);

  const pool = getPool();
  const words = shuffle(pool).slice(0, cfg.count);
  session = { words, idx: 0, correct: 0, wrong: 0, score: 0, streak: 0, bestStreak: 0, wrongWords: [] };

  document.getElementById('setup-screen').style.display = 'none';
  const qs = document.getElementById('quiz-screen');
  qs.style.display = 'flex';

  renderQuestion();
}

function renderQuestion() {
  answered = false;
  fcFlipped = false;

  const word = session.words[session.idx];
  const total = session.words.length;
  const isFC = cfg.mode === 'flashcard';

  // Progress
  document.getElementById('progress-fill').style.width = (session.idx / total * 100) + '%';

  // Streak badge
  const badge = document.getElementById('streak-badge');
  if (session.streak >= 3) {
    document.getElementById('streak-num').textContent = session.streak;
    badge.classList.add('visible');
  } else {
    badge.classList.remove('visible');
  }

  // Header stats
  document.getElementById('h-correct').textContent = session.correct;
  document.getElementById('h-wrong').textContent = session.wrong;
  document.getElementById('h-score').textContent = session.score;

  // Mode areas
  document.getElementById('mc-area').style.display = isFC ? 'none' : 'flex';
  document.getElementById('fc-area').style.display = isFC ? 'flex' : 'none';

  // Hide feedback/next
  document.getElementById('feedback').classList.remove('show');
  document.getElementById('next-btn').classList.remove('show');
  document.getElementById('fc-buttons').style.display = 'none';

  if (isFC) {
    renderFlashcard(word);
  } else {
    renderMC(word);
  }
}

function renderMC(word) {
  const total = session.words.length;
  const meta = `問題 ${session.idx + 1} / ${total}　　<span class="level-pill pill-${word.level}">${word.level}</span>`;
  document.getElementById('q-meta').innerHTML = meta;

  let prompt = '', promptSub = '';
  if (cfg.mode === 'kanji_to_meaning') {
    prompt = word.kanji || word.kana;
    promptSub = word.kanji ? word.kana : word.romaji;
  } else if (cfg.mode === 'meaning_to_kanji') {
    prompt = word.meaning;
    promptSub = '';
  } else if (cfg.mode === 'kana_to_kanji') {
    prompt = word.kana;
    promptSub = word.romaji;
  }

  document.getElementById('q-prompt').textContent = prompt;
  document.getElementById('q-prompt-sub').textContent = promptSub;

  // Build choices
  const pool = getPool();
  const choices = buildChoices(word, pool);
  const container = document.getElementById('choices');
  container.innerHTML = '';

  choices.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    let text = '', sub = '';

    if (cfg.mode === 'kanji_to_meaning' || cfg.mode === 'kana_to_kanji') {
      text = c.word.meaning;
      sub = c.word.meaning_ja;
    } else {
      text = c.word.kanji || c.word.kana;
      sub = c.word.kana;
    }

    btn.innerHTML = `<span class="choice-text">${text}</span><span class="choice-sub">${sub}</span>`;
    btn.dataset.correct = c.correct;
    btn.dataset.wordId = c.word.id;
    btn.onclick = () => answerMC(btn, c.correct, word);
    container.appendChild(btn);
  });
}

function renderFlashcard(word) {
  const total = session.words.length;
  document.getElementById('fc-meta').innerHTML = `問題 ${session.idx + 1} / ${total}　<span class="level-pill pill-${word.level}">${word.level}</span>`;
  document.getElementById('fc-prompt').textContent = word.kanji || word.kana;
  document.getElementById('fc-kana').textContent = word.kanji ? word.kana : word.romaji;
  document.getElementById('fc-meaning').textContent = word.meaning;
  document.getElementById('fc-meaning-ja').textContent = word.meaning_ja;
  document.getElementById('fc-example').textContent = word.example_ja || '';
  document.getElementById('flashcard').classList.remove('flipped');
}

function flipCard() {
  if (fcFlipped) return;
  fcFlipped = true;
  document.getElementById('flashcard').classList.add('flipped');
  setTimeout(() => {
    document.getElementById('fc-buttons').style.display = 'grid';
  }, 400);
}

function fcAnswer(knew) {
  updateScore(knew, session.words[session.idx]);
  session.idx++;
  if (session.idx >= session.words.length) {
    showResults();
  } else {
    setTimeout(renderQuestion, 200);
  }
}

function answerMC(btn, isCorrect, word) {
  if (answered) return;
  answered = true;

  // Color all buttons
  document.querySelectorAll('.choice-btn').forEach(b => {
    b.disabled = true;
    if (b.dataset.wordId === word.id) {
      b.classList.add('correct');
    } else if (b === btn && !isCorrect) {
      b.classList.add('wrong');
    }
  });

  updateScore(isCorrect, word);
  showFeedback(isCorrect, word);
  document.getElementById('next-btn').classList.add('show');
}

function updateScore(isCorrect, word) {
  if (isCorrect) {
    session.correct++;
    session.streak++;
    if (session.streak > session.bestStreak) session.bestStreak = session.streak;
    const bonus = session.streak >= 5 ? 30 : session.streak >= 3 ? 20 : 10;
    session.score += bonus;
  } else {
    session.wrong++;
    session.streak = 0;
    session.wrongWords.push(word);
  }
  document.getElementById('h-correct').textContent = session.correct;
  document.getElementById('h-wrong').textContent = session.wrong;
  document.getElementById('h-score').textContent = session.score;

  const badge = document.getElementById('streak-badge');
  if (session.streak >= 3) {
    document.getElementById('streak-num').textContent = session.streak;
    badge.classList.add('visible');
  } else {
    badge.classList.remove('visible');
  }
}

function showFeedback(isCorrect, word) {
  const fb = document.getElementById('feedback');
  fb.className = 'feedback show ' + (isCorrect ? 'correct' : 'wrong');
  document.getElementById('feedback-head').textContent = isCorrect
    ? `✓ 正解！ — ${word.meaning}`
    : `✗ 不正解 — 正解: ${word.kanji || word.kana}「${word.meaning}」`;
  let ex = '';
  if (word.example_ja) ex = `例文: ${word.example_ja}${word.example_en ? '　(' + word.example_en + ')' : ''}`;
  document.getElementById('feedback-example').textContent = ex;
}

function nextQuestion() {
  session.idx++;
  if (session.idx >= session.words.length) {
    showResults();
  } else {
    renderQuestion();
  }
}

// ── Results
function grade(pct) {
  if (pct >= 95) return ['S', '優秀'];
  if (pct >= 80) return ['A', '良い'];
  if (pct >= 65) return ['B', '普通'];
  if (pct >= 50) return ['C', '要復習'];
  return ['D', '要勉強'];
}

function showResults() {
  document.getElementById('quiz-screen').style.display = 'none';
  const rs = document.getElementById('result-screen');
  rs.style.display = 'flex';

  const total = session.words.length;
  const acc = total > 0 ? (session.correct / total * 100) : 0;
  const [letter, label] = grade(acc);

  const gradeColors = { S: '#d4a426', A: '#4caf78', B: '#5ba4cf', C: '#e09060', D: '#e05a3a' };
  document.getElementById('grade-letter').textContent = letter;
  document.getElementById('grade-letter').style.color = gradeColors[letter];
  document.getElementById('grade-label').textContent = label;

  document.getElementById('r-correct').textContent = session.correct;
  document.getElementById('r-wrong').textContent = session.wrong;
  document.getElementById('r-score').textContent = session.score;
  document.getElementById('r-accuracy').textContent = acc.toFixed(0) + '%';
  document.getElementById('r-streak').textContent = session.bestStreak + '連続';

  // Wrong words
  if (session.wrongWords.length > 0) {
    document.getElementById('wrong-section').style.display = 'block';
    const list = document.getElementById('wrong-list');
    list.innerHTML = session.wrongWords.map(w => `
      <div class="wrong-word">
        <div>
          <span class="ww-kanji">${w.kanji || w.kana}</span>
          <span class="ww-kana">${w.kanji ? w.kana : w.romaji}</span>
        </div>
        <div class="ww-meaning">${w.meaning}</div>
      </div>
    `).join('');
  } else {
    document.getElementById('wrong-section').style.display = 'none';
  }
}

function restartQuiz() {
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('setup-screen').style.display = 'flex';
  document.getElementById('h-correct').textContent = '0';
  document.getElementById('h-wrong').textContent = '0';
  document.getElementById('h-score').textContent = '0';
}
</script>
